apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub-kafka
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
  - name: brokers
    value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  - name: authType
    value: "none"
  - name: maxMessageBytes
    value: "1048576"
  - name: consumerFetchMin
    value: "1"
  - name: consumerFetchDefault
    value: "1048576"
  - name: consumerGroup
    value: "{app-id}-consumer-group"
  - name: disableTls
    value: "true"
