name: Phase V - Deploy to AKS

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AKS_CLUSTER_NAME: todo-aks
  AKS_RESOURCE_GROUP: todo-rg
  HELM_RELEASE_NAME: todo-app

jobs:
  # ============================================
  # Job 1: Build and Test
  # ============================================
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --passWithNoTests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest --cov=app --cov-report=xml || echo "No tests found"

      - name: Generate version tag
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            VERSION=latest
          else
            VERSION=dev-${{ github.sha }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false

  # ============================================
  # Job 2: Build Docker Images
  # ============================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    
    outputs:
      chat-api-image: ${{ steps.chat-api.outputs.image }}
      recurring-service-image: ${{ steps.recurring.outputs.image }}
      notification-service-image: ${{ steps.notification.outputs.image }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Chat API
        id: chat-api-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/todo-chatbot/chat-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short

      - name: Build and push Chat API
        id: chat-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.chat-api-meta.outputs.tags }}
          labels: ${{ steps.chat-api-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata for Recurring Service
        id: recurring-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/todo-chatbot/recurring-service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short

      - name: Build and push Recurring Service
        id: recurring
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/recurring-service/Dockerfile
          push: true
          tags: ${{ steps.recurring-meta.outputs.tags }}
          labels: ${{ steps.recurring-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata for Notification Service
        id: notification-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/todo-chatbot/notification-service
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short

      - name: Build and push Notification Service
        id: notification
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/notification-service/Dockerfile
          push: true
          tags: ${{ steps.notification-meta.outputs.tags }}
          labels: ${{ steps.notification-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================
  # Job 3: Security Scan
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/todo-chatbot/chat-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # Job 4: Deploy to AKS
  # ============================================
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build, build-images]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: Azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Set up kubectl
        uses: Azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: Azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          admin: 'false'

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Verify Dapr installation
        run: |
          dapr status -k || echo "Dapr not installed, installing..."
          if ! dapr status -k > /dev/null 2>&1; then
            dapr init -k
          fi

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic db-credentials \
            --from-literal=username=${{ secrets.DB_USERNAME }} \
            --from-literal=password='${{ secrets.DB_PASSWORD }}' \
            --from-literal=host=${{ secrets.DB_HOST }} \
            --from-literal=port=${{ secrets.DB_PORT }} \
            --namespace default \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic redis-secret \
            --from-literal=password='${{ secrets.REDIS_PASSWORD }}' \
            --namespace redis \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic email-smtp \
            --from-literal=host=${{ secrets.SMTP_HOST }} \
            --from-literal=port=${{ secrets.SMTP_PORT }} \
            --from-literal=username=${{ secrets.SMTP_USERNAME }} \
            --from-literal=password='${{ secrets.SMTP_PASSWORD }}' \
            --namespace default \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic push-notification \
            --from-literal=firebaseApiKey='${{ secrets.FIREBASE_API_KEY }}' \
            --namespace default \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Dapr components
        run: |
          kubectl apply -f helm/dapr-components/

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm \
            --namespace default \
            --values helm/values.yaml \
            --values helm/values-aks.yaml \
            --set chat-api.image.repository=${{ env.REGISTRY }}/todo-chatbot/chat-api \
            --set chat-api.image.tag=${{ github.sha }} \
            --set recurringTaskService.image.repository=${{ env.REGISTRY }}/todo-chatbot/recurring-service \
            --set recurringTaskService.image.tag=${{ github.sha }} \
            --set notificationService.image.repository=${{ env.REGISTRY }}/todo-chatbot/notification-service \
            --set notificationService.image.tag=${{ github.sha }} \
            --set database.host=${{ secrets.DB_HOST }} \
            --set redis.host=${{ secrets.REDIS_HOST }} \
            --wait \
            --timeout 10m \
            --atomic

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-chat-api --timeout=300s
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-recurring-task-service --timeout=300s
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-notification-service --timeout=300s
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-audit-service --timeout=300s
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-websocket-service --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -l app.kubernetes.io/instance=${{ env.HELM_RELEASE_NAME }}
          kubectl get deployments
          kubectl get services
          dapr status -k

      - name: Run smoke tests
        run: |
          # Get service endpoint
          CHAT_API_URL=$(kubectl get svc ${{ env.HELM_RELEASE_NAME }}-chat-api -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          
          # Health check
          curl -f http://$CHAT_API_URL/health || exit 1
          
          # Test task creation
          curl -X POST http://$CHAT_API_URL/api/v1/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"Smoke Test Task","priority":"low"}' \
            || echo "Smoke test failed"

      - name: Logout from Azure
        if: always()
        run: az logout

  # ============================================
  # Job 5: Deploy Frontend to Vercel
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  # ============================================
  # Job 6: Notify
  # ============================================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [deploy, deploy-frontend]
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Deployment ${{ needs.deploy.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment Status: ${{ needs.deploy.result }}*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}

      - name: Send email notification (optional)
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Deployment ${{ needs.deploy.result }} - ${{ github.repository }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: "GitHub Actions <noreply@todo-chatbot.com>"
          body: |
            Deployment completed with status: ${{ needs.deploy.result }}
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}
            
            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        if: ${{ secrets.NOTIFICATION_EMAIL != '' }}
