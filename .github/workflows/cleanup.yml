name: Phase V - Cleanup Resources

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to cleanup (staging/production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      delete-namespace:
        description: 'Delete entire namespace'
        required: false
        default: 'false'
        type: boolean

jobs:
  cleanup:
    name: Cleanup Kubernetes Resources
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: Azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: Azure/aks-set-context@v3
        with:
          resource-group: ${{ inputs.environment == 'production' && 'todo-rg' && 'todo-rg-staging' }}
          cluster-name: ${{ inputs.environment == 'production' && 'todo-aks' && 'todo-aks-staging' }}

      - name: Delete Helm release
        run: |
          helm uninstall todo-app${{ inputs.environment == 'staging' && '-staging' || '' }} --namespace default || echo "Release not found"

      - name: Delete namespace (optional)
        if: inputs.delete-namespace == 'true'
        run: |
          kubectl delete namespace default --ignore-not-found

      - name: Delete Dapr components
        run: |
          kubectl delete -f helm/dapr-components/ --ignore-not-found

      - name: Delete secrets
        run: |
          kubectl delete secret db-credentials --ignore-not-found
          kubectl delete secret redis-secret --ignore-not-found
          kubectl delete secret email-smtp --ignore-not-found
          kubectl delete secret push-notification --ignore-not-found

      - name: Delete Kafka topics
        run: |
          kubectl exec -it kafka-cluster-kafka-0 -n kafka -- \
            bin/kafka-topics.sh --delete --topic task-events --bootstrap-server kafka-cluster-kafka-bootstrap:9092 || echo "Topic not found"
          
          kubectl exec -it kafka-cluster-kafka-0 -n kafka -- \
            bin/kafka-topics.sh --delete --topic reminders --bootstrap-server kafka-cluster-kafka-bootstrap:9092 || echo "Topic not found"
          
          kubectl exec -it kafka-cluster-kafka-0 -n kafka -- \
            bin/kafka-topics.sh --delete --topic task-updates --bootstrap-server kafka-cluster-kafka-bootstrap:9092 || echo "Topic not found"

      - name: Verify cleanup
        run: |
          kubectl get pods
          kubectl get deployments
          kubectl get services
          helm list

      - name: Logout from Azure
        if: always()
        run: az logout
