name: Phase V - Deploy to Staging

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

env:
  REGISTRY: ghcr.io
  AKS_CLUSTER_NAME: todo-aks-staging
  AKS_RESOURCE_GROUP: todo-rg-staging
  HELM_RELEASE_NAME: todo-app-staging
  ENVIRONMENT: staging

jobs:
  # ============================================
  # Job 1: Build and Test
  # ============================================
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run tests
        run: |
          cd frontend
          npm test -- --passWithNoTests
          cd ../backend
          pytest --cov=app || echo "No tests"

  # ============================================
  # Job 2: Build Docker Images
  # ============================================
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Chat API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/todo-chatbot/chat-api:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Recurring Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/recurring-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/todo-chatbot/recurring-service:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Notification Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/notification-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/todo-chatbot/notification-service:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 3: Deploy to Staging AKS
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: Azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Set up kubectl
        uses: Azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Get AKS credentials
        uses: Azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ./helm \
            --namespace default \
            --values helm/values.yaml \
            --values helm/values-staging.yaml \
            --set chat-api.image.repository=${{ env.REGISTRY }}/todo-chatbot/chat-api \
            --set chat-api.image.tag=staging-${{ github.sha }} \
            --set recurringTaskService.image.repository=${{ env.REGISTRY }}/todo-chatbot/recurring-service \
            --set recurringTaskService.image.tag=staging-${{ github.sha }} \
            --set notificationService.image.repository=${{ env.REGISTRY }}/todo-chatbot/notification-service \
            --set notificationService.image.tag=staging-${{ github.sha }} \
            --set replicaCount=1 \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -l app.kubernetes.io/instance=${{ env.HELM_RELEASE_NAME }}
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-chat-api

      - name: Run integration tests
        run: |
          # Get service endpoint
          CHAT_API_URL=$(kubectl get svc ${{ env.HELM_RELEASE_NAME }}-chat-api -o jsonpath='{.status.clusterIP}')
          
          # Health check
          curl -f http://$CHAT_API_URL/health
          
          # Run integration tests
          cd tests/integration
          npm run test:staging

      - name: Logout from Azure
        if: always()
        run: az logout
