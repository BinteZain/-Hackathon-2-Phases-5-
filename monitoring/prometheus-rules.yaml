# Prometheus Rules for Todo Chatbot Application
# File: monitoring/prometheus-rules.yaml

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: todo-app-alerts
  namespace: monitoring
  labels:
    release: monitoring
    app: todo-chatbot
spec:
  groups:
    # ==========================================
    # Application Alerts
    # ==========================================
    - name: todo-app.rules
      interval: 30s
      rules:
        # High Error Rate (> 5% for 5 minutes)
        - alert: TodoAppHighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5..",job=~".*chat-api.*"}[5m])) 
            / sum(rate(http_requests_total{job=~".*chat-api.*"}[5m])) * 100 > 5
          for: 5m
          labels:
            severity: critical
            service: chat-api
          annotations:
            summary: "🔴 High error rate detected"
            description: "Error rate is {{ $value }}% (threshold: 5%)"
            runbook_url: "https://github.com/todo-chatbot/runbooks/high-error-rate.md"
        
        # High Latency (p95 > 1s for 5 minutes)
        - alert: TodoAppHighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=~".*chat-api.*"}[5m])) by (le)) > 1
          for: 5m
          labels:
            severity: warning
            service: chat-api
          annotations:
            summary: "🐌 High latency detected"
            description: "p95 latency is {{ $value }}s (threshold: 1s)"
            runbook_url: "https://github.com/todo-chatbot/runbooks/high-latency.md"
        
        # Low Throughput
        - alert: TodoAppLowThroughput
          expr: |
            sum(rate(http_requests_total{job=~".*chat-api.*"}[5m])) < 10
          for: 10m
          labels:
            severity: warning
            service: chat-api
          annotations:
            summary: "📉 Low request throughput"
            description: "Request rate is {{ $value }} req/s (threshold: 10)"
        
        # Service Unavailable
        - alert: TodoAppServiceDown
          expr: |
            up{job=~".*chat-api.*"} == 0
          for: 2m
          labels:
            severity: critical
            service: chat-api
          annotations:
            summary: "🔥 Chat API service is down"
            description: "Service {{ $labels.job }} has been down for 2 minutes"
        
        # ==========================================
        # Pod Health Alerts
        # ==========================================
    - name: pod-health.rules
      interval: 30s
      rules:
        # Pod Not Ready
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{condition="true",namespace="default"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for 5 minutes"
        
        # Pod Restarting
        - alert: PodRestarting
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="default"}[1h]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} restarting frequently"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour"
        
        # Pod OOMKilled
        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled",namespace="default"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} OOM killed"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOM killed"
        
        # ==========================================
        # Resource Alerts
        # ==========================================
    - name: resource-alerts.rules
      interval: 30s
      rules:
        # High CPU Usage (> 80% for 10 minutes)
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="default"}[5m])) by (pod) 
            / sum(kube_pod_container_resource_limits{resource="cpu",namespace="default"}) by (pod) * 100 > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage for {{ $labels.pod }}"
            description: "CPU usage is {{ $value }}% (threshold: 80%)"
        
        # High Memory Usage (> 85% for 10 minutes)
        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="default"}) by (pod) 
            / sum(kube_pod_container_resource_limits{resource="memory",namespace="default"}) by (pod) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage for {{ $labels.pod }}"
            description: "Memory usage is {{ $value }}% (threshold: 85%)"
        
        # Disk Space Low
        - alert: DiskSpaceLow
          expr: |
            (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Low disk space on {{ $labels.instance }}"
            description: "Disk space is {{ $value }}% available (threshold: 15%)"
        
        # ==========================================
        # Dapr Alerts
        # ==========================================
    - name: dapr-alerts.rules
      interval: 30s
      rules:
        # Dapr Sidecar Down
        - alert: DaprSidecarDown
          expr: |
            dapr_runtime_component_status != 1
          for: 2m
          labels:
            severity: critical
            service: dapr
          annotations:
            summary: "Dapr sidecar down for {{ $labels.app_id }}"
            description: "Dapr sidecar for application {{ $labels.app_id }} is not healthy"
        
        # Dapr HTTP Error Rate
        - alert: DaprHTTPErrorRate
          expr: |
            sum(rate(dapr_runtime_http_errors_total[5m])) / sum(rate(dapr_runtime_http_requests_total[5m])) * 100 > 5
          for: 5m
          labels:
            severity: warning
            service: dapr
          annotations:
            summary: "High Dapr HTTP error rate"
            description: "Dapr HTTP error rate is {{ $value }}% (threshold: 5%)"
        
        # Dapr gRPC Error Rate
        - alert: DaprGRPCCallFailed
          expr: |
            rate(dapr_runtime_grpc_errors_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
            service: dapr
          annotations:
            summary: "Dapr gRPC calls failing"
            description: "Dapr gRPC error rate is {{ $value }} errors/s"
        
        # Dapr Actor Deactivation
        - alert: DaprActorDeactivationFailed
          expr: |
            rate(dapr_runtime_actor_deactivated_total{success="false"}[5m]) > 0
          for: 5m
          labels:
            severity: warning
            service: dapr
          annotations:
            summary: "Dapr actor deactivation failures"
            description: "Dapr actor deactivation failures detected for {{ $labels.actor_type }}"
        
        # ==========================================
        # Kafka Alerts
        # ==========================================
    - name: kafka-alerts.rules
      interval: 30s
      rules:
        # Kafka Consumer Lag (> 1000 for 5 minutes)
        - alert: KafkaConsumerLag
          expr: |
            sum(kafka_consumer_group_lag{namespace="kafka"}) by (group, topic) > 1000
          for: 5m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "High Kafka consumer lag"
            description: "Consumer group {{ $labels.group }} has lag of {{ $value }} on topic {{ $labels.topic }}"
        
        # Kafka Broker Down
        - alert: KafkaBrokerDown
          expr: |
            kafka_broker_info == 0
          for: 2m
          labels:
            severity: critical
            service: kafka
          annotations:
            summary: "Kafka broker down"
            description: "Kafka broker {{ $labels.broker }} is not responding"
        
        # Kafka Topic Under Replicated
        - alert: KafkaTopicUnderReplicated
          expr: |
            kafka_topic_partition_under_replicated > 0
          for: 5m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "Kafka topic under-replicated"
            description: "Topic {{ $labels.topic }} partition {{ $labels.partition }} is under-replicated"
        
        # Kafka No Consumers
        - alert: KafkaNoConsumers
          expr: |
            count(kafka_consumer_group_members) by (group) == 0
          for: 10m
          labels:
            severity: warning
            service: kafka
          annotations:
            summary: "Kafka consumer group has no members"
            description: "Consumer group {{ $labels.group }} has no active consumers"
        
        # ==========================================
        # Database Alerts
        # ==========================================
    - name: database-alerts.rules
      interval: 30s
      rules:
        # PostgreSQL Connection High
        - alert: PostgreSQLConnectionsHigh
          expr: |
            pg_stat_activity_count / pg_settings_max_connections * 100 > 80
          for: 10m
          labels:
            severity: warning
            service: postgresql
          annotations:
            summary: "PostgreSQL connections high"
            description: "PostgreSQL connection usage is {{ $value }}% (threshold: 80%)"
        
        # PostgreSQL Long Running Queries
        - alert: PostgreSQLLongRunningQueries
          expr: |
            pg_stat_activity_max_tx_duration > 300
          for: 5m
          labels:
            severity: warning
            service: postgresql
          annotations:
            summary: "PostgreSQL long running queries"
            description: "PostgreSQL has queries running for more than 5 minutes"
        
        # ==========================================
        # Storage Alerts
        # ==========================================
    - name: storage-alerts.rules
      interval: 30s
      rules:
        # Persistent Volume Almost Full
        - alert: PersistentVolumeAlmostFull
          expr: |
            (kubelet_volume_stats_capacity_bytes - kubelet_volume_stats_available_bytes) 
            / kubelet_volume_stats_capacity_bytes * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PersistentVolume almost full"
            description: "PersistentVolume {{ $labels.persistentvolumeclaim }} is {{ $value }}% full"
        
        # Persistent Volume Critical
        - alert: PersistentVolumeCritical
          expr: |
            (kubelet_volume_stats_capacity_bytes - kubelet_volume_stats_available_bytes) 
            / kubelet_volume_stats_capacity_bytes * 100 > 95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PersistentVolume critically full"
            description: "PersistentVolume {{ $labels.persistentvolumeclaim }} is {{ $value }}% full - immediate action required!"
