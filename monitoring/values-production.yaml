# Prometheus Stack Production Values
# File: monitoring/values-production.yaml

prometheus:
  enabled: true
  prometheusSpec:
    # Number of Prometheus replicas for HA
    replicas: 2
    
    # Data retention period
    retention: 30d
    retentionSize: 45GB
    
    # Resource requests and limits
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi
    
    # Persistent storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: default
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    
    # ServiceMonitor selector
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    
    # Additional scrape configs for Dapr
    additionalScrapeConfigs:
      - job_name: 'dapr-metrics'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_dapr_io_enabled]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_dapr_io_app_port]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
            replacement: /metrics
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_dapr_io_app_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
    
    # Pod annotations
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9090"

alertmanager:
  enabled: true
  alertmanagerSpec:
    # Number of Alertmanager replicas
    replicas: 2
    
    # Persistent storage
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: default
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    
    # Resources
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        cpu: 200m
        memory: 200Mi
    
    # Alertmanager configuration
    secrets:
      - alertmanager-monitoring-alertmanager

grafana:
  enabled: true
  
  # Number of Grafana replicas
  replicas: 2
  
  # Admin password (CHANGE THIS!)
  adminPassword: admin
  
  # Persistent storage
  persistence:
    enabled: true
    type: sts
    storageClassName: default
    size: 10Gi
  
  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  # Service configuration
  service:
    type: LoadBalancer
    port: 80
    annotations:
      service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /api/health
  
  # Ingress configuration (optional)
  ingress:
    enabled: false
    # ingressClassName: nginx
    # hosts:
    #   - grafana.todo-chatbot.com
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.todo-chatbot.com
  
  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  
  # Pre-configured dashboards
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 1
        datasource: Prometheus
      prometheus-stats:
        gnetId: 2
        revision: 1
        datasource: Prometheus
      dapr-dashboard:
        gnetId: 13817
        revision: 1
        datasource: Prometheus
      kafka-overview:
        gnetId: 7589
        revision: 5
        datasource: Prometheus
  
  # Additional Grafana configuration
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
    auth:
      disable_login_form: false
    analytics:
      check_for_updates: true
      reporting_enabled: true
  
  # Sidecar for dashboards
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      folder: /var/lib/grafana/dashboards/default

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Prometheus Operator configuration
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
  
  # Admission webhooks
  admissionWebhooks:
    deployment:
      enabled: true

# Default rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubeScheduler: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Extra manifests (for custom configurations)
extraManifests: []
