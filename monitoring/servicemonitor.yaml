# Dapr ServiceMonitor
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dapr-metrics
  namespace: default
  labels:
    app: dapr
    release: monitoring
spec:
  selector:
    matchLabels:
      dapr.io/sidecar: "true"
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
